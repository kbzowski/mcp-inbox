<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Claude Search</title>
    <style>html, body { min-width: 380px; min-height: 480px; }</style>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div id="search-bar">
      <input
        type="text"
        id="query"
        placeholder="Emails from John about project last week…"
        autofocus
        spellcheck="false"
      />
      <button id="search-btn">Search</button>
    </div>
    <div id="status"></div>
    <div id="results"></div>
    <script src="sidebar.js"></script>
  </body>
</html>
