pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{ts,js,mjs,json,md,yml,yaml}'
      run: npx prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob: 'src/**/*.ts'
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    - name: prettier-thunderbird
      glob: 'thunderbird-plugin/src/**/*.{ts,js,mjs,json}'
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: npm run typecheck

    - name: typecheck-thunderbird
      run: npm run typecheck --prefix thunderbird-plugin

    - name: test
      run: npm run test
